name: Build and deploy to Tophost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tophost-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build static site and upload via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check and build
        run: yarn quality

      - name: Install deploy client
        run: sudo apt-get update && sudo apt-get install -y lftp netcat-openbsd

      - name: Validate FTP secrets
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          test -n "$TOPHOST_FTP_SERVER" || (echo "Missing secret: TOPHOST_FTP_SERVER" && exit 1)
          test -n "$TOPHOST_FTP_USERNAME" || (echo "Missing secret: TOPHOST_FTP_USERNAME" && exit 1)
          test -n "$TOPHOST_FTP_PASSWORD" || (echo "Missing secret: TOPHOST_FTP_PASSWORD" && exit 1)
          test -n "$TOPHOST_FTP_DIR" || (echo "Missing secret: TOPHOST_FTP_DIR" && exit 1)

      - name: Prepare FTP config
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_PORT: ${{ secrets.TOPHOST_FTP_PORT || 21 }}
        run: |
          cat > ~/.lftprc <<EOF
          set net:timeout 45
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set ftp:passive-mode on
          set ftp:prefer-epsv no
          set ftp:ssl-allow yes
          set ftp:ssl-force yes
          set ftp:ssl-auth TLS
          set ftp:ssl-protect-data yes
          set cmd:fail-exit yes
          set ssl:verify-certificate no
          open -u "$TOPHOST_FTP_USERNAME","$TOPHOST_FTP_PASSWORD" -p "$TOPHOST_FTP_PORT" "ftp://$TOPHOST_FTP_SERVER"
          EOF

      - name: Check FTP server reachability
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_PORT: ${{ secrets.TOPHOST_FTP_PORT || 21 }}
        run: |
          nc -z -w 15 "$TOPHOST_FTP_SERVER" "$TOPHOST_FTP_PORT" || {
            echo "FTP server is not reachable on the configured port"
            exit 1
          }

      - name: Normalize FTP target paths
        env:
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          REMOTE_DIR="${TOPHOST_FTP_DIR%/}/"
          echo "REMOTE_DIR=$REMOTE_DIR" >> "$GITHUB_ENV"
          echo "REMOTE_PRJ_DIR=${REMOTE_DIR}prj/" >> "$GITHUB_ENV"
          echo "Remote target prepared"

      - name: Check FTP login and target
        run: |
          lftp -e "cd ${REMOTE_DIR}; pwd; bye"

      - name: Deploy site to Tophost via FTP
        run: |
          lftp -e "mirror --reverse --verbose --only-newer --no-perms --parallel=1 --exclude-glob prj/** ./.output/public/ ${REMOTE_DIR}; mkdir -p ${REMOTE_PRJ_DIR}; mirror --reverse --verbose --only-newer --no-perms --parallel=1 ./.output/public/prj/ ${REMOTE_PRJ_DIR}; bye"
