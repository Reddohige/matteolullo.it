name: Build and deploy to Tophost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tophost-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build static site and upload via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check and build
        run: yarn quality

      - name: Install deploy client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Validate FTP secrets
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          test -n "$TOPHOST_FTP_SERVER" || (echo "Missing secret: TOPHOST_FTP_SERVER" && exit 1)
          test -n "$TOPHOST_FTP_USERNAME" || (echo "Missing secret: TOPHOST_FTP_USERNAME" && exit 1)
          test -n "$TOPHOST_FTP_PASSWORD" || (echo "Missing secret: TOPHOST_FTP_PASSWORD" && exit 1)
          test -n "$TOPHOST_FTP_DIR" || (echo "Missing secret: TOPHOST_FTP_DIR" && exit 1)

      - name: Deploy site to Tophost via FTP
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
          TOPHOST_FTP_PROTOCOL: ${{ secrets.TOPHOST_FTP_PROTOCOL || 'ftp' }}
          TOPHOST_FTP_PORT: ${{ secrets.TOPHOST_FTP_PORT || 21 }}
        run: |
          lftp -u "$TOPHOST_FTP_USERNAME","$TOPHOST_FTP_PASSWORD" \
            -p "$TOPHOST_FTP_PORT" "$TOPHOST_FTP_PROTOCOL://$TOPHOST_FTP_SERVER" \
            -e "set net:timeout 30; set net:max-retries 3; set ftp:passive-mode on; set ftp:ssl-allow no; mirror --reverse --verbose --only-newer --no-perms --exclude-glob prj/** ./.output/public/ $TOPHOST_FTP_DIR; bye"

      - name: Deploy prj index to Tophost via FTP
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
          TOPHOST_FTP_PROTOCOL: ${{ secrets.TOPHOST_FTP_PROTOCOL || 'ftp' }}
          TOPHOST_FTP_PORT: ${{ secrets.TOPHOST_FTP_PORT || 21 }}
        run: |
          lftp -u "$TOPHOST_FTP_USERNAME","$TOPHOST_FTP_PASSWORD" \
            -p "$TOPHOST_FTP_PORT" "$TOPHOST_FTP_PROTOCOL://$TOPHOST_FTP_SERVER" \
            -e "set net:timeout 30; set net:max-retries 3; set ftp:passive-mode on; set ftp:ssl-allow no; mirror --reverse --verbose --only-newer --no-perms ./.output/public/prj/ ${TOPHOST_FTP_DIR}prj/; bye"
