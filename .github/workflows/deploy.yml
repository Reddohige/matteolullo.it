name: Build and deploy to Tophost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tophost-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build static site and upload via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check and build
        run: yarn quality

      - name: Validate FTP secrets
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          test -n "$TOPHOST_FTP_SERVER" || (echo "Missing secret: TOPHOST_FTP_SERVER" && exit 1)
          test -n "$TOPHOST_FTP_USERNAME" || (echo "Missing secret: TOPHOST_FTP_USERNAME" && exit 1)
          test -n "$TOPHOST_FTP_PASSWORD" || (echo "Missing secret: TOPHOST_FTP_PASSWORD" && exit 1)
          test -n "$TOPHOST_FTP_DIR" || (echo "Missing secret: TOPHOST_FTP_DIR" && exit 1)

      - name: Deploy site to Tophost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.TOPHOST_FTP_SERVER }}
          username: ${{ secrets.TOPHOST_FTP_USERNAME }}
          password: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          local-dir: ./.output/public/
          server-dir: ${{ secrets.TOPHOST_FTP_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            prj/**

      - name: Deploy prj index to Tophost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.TOPHOST_FTP_SERVER }}
          username: ${{ secrets.TOPHOST_FTP_USERNAME }}
          password: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          local-dir: ./.output/public/prj/
          server-dir: ${{ secrets.TOPHOST_FTP_DIR }}prj/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
