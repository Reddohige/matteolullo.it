name: Build and deploy to Tophost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tophost-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build static site and upload via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check and build
        run: yarn quality

      - name: Install deploy client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Validate FTP secrets
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          test -n "$TOPHOST_FTP_SERVER" || (echo "Missing secret: TOPHOST_FTP_SERVER" && exit 1)
          test -n "$TOPHOST_FTP_USERNAME" || (echo "Missing secret: TOPHOST_FTP_USERNAME" && exit 1)
          test -n "$TOPHOST_FTP_PASSWORD" || (echo "Missing secret: TOPHOST_FTP_PASSWORD" && exit 1)
          test -n "$TOPHOST_FTP_DIR" || (echo "Missing secret: TOPHOST_FTP_DIR" && exit 1)

      - name: Prepare FTP config
        env:
          TOPHOST_FTP_SERVER: ${{ secrets.TOPHOST_FTP_SERVER }}
          TOPHOST_FTP_USERNAME: ${{ secrets.TOPHOST_FTP_USERNAME }}
          TOPHOST_FTP_PASSWORD: ${{ secrets.TOPHOST_FTP_PASSWORD }}
          TOPHOST_FTP_PROTOCOL: ${{ secrets.TOPHOST_FTP_PROTOCOL || 'ftp' }}
          TOPHOST_FTP_PORT: ${{ secrets.TOPHOST_FTP_PORT || 21 }}
        run: |
          cat > ~/.lftprc <<EOF
          set net:timeout 45
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set ftp:passive-mode on
          set ftp:ssl-allow no
          set ssl:verify-certificate no
          open -u "$TOPHOST_FTP_USERNAME","$TOPHOST_FTP_PASSWORD" -p "$TOPHOST_FTP_PORT" "$TOPHOST_FTP_PROTOCOL://$TOPHOST_FTP_SERVER"
          EOF

      - name: Check FTP connection
        env:
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          lftp -e "pwd; cls -la $TOPHOST_FTP_DIR; bye"

      - name: Deploy site to Tophost via FTP
        env:
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          lftp -e "mirror --reverse --verbose --only-newer --no-perms --parallel=1 --exclude-glob prj/** ./.output/public/ $TOPHOST_FTP_DIR; bye"

      - name: Deploy prj index to Tophost via FTP
        env:
          TOPHOST_FTP_DIR: ${{ secrets.TOPHOST_FTP_DIR }}
        run: |
          lftp -e "mkdir -p ${TOPHOST_FTP_DIR}prj/; mirror --reverse --verbose --only-newer --no-perms --parallel=1 ./.output/public/prj/ ${TOPHOST_FTP_DIR}prj/; bye"
